experiment:
  name: "omnishift_v2_learnable"
  phase: 7
  dataset: "cifar10"
  seed: 42

model:
  type: "omnishift_v2"
  sparse_mode: "learnable"
  bn_warmup: 30
  ewgs_lambda: 0.02
  act_levels: 8
  act_alpha_init: 4.0

training:
  epochs: 200
  batch_size: 256
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 0
  clip_grad: 1.0
  sparsity_lambda: 0.0001

output:
  checkpoint_dir: "checkpoints/phase7"
  log_dir: "logs/phase7"
