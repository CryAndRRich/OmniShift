experiment:
  name: "sparseshift_learnable_potbn_w30_ewgs"  # sparseshift_fixed50_potbn_w30_ewgs | sparseshift_learnable_potbn_w30_ewgs
  dataset: "cifar10"
  seed: 42
  phase: 5

model:
  type: "ewgs"           # src.models.resnet20_ewgs.build_model
  sparse_mode: "learnable"  # fixed | learnable
  sparsity_ratio: 0.5    # used for fixed mode only
  bn_warmup: 30          # epochs of std-BN warmup before PoT activates
  ewgs_lambda: 0.02      # EWGS scaling factor (λ)

training:
  epochs: 200
  batch_size: 256
  lr: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  warmup_epochs: 0
  sparsity_lambda: 1.0e-4
  clip_grad: 0.0

output:
  checkpoint_dir: "checkpoints/phase5"
  log_dir: "logs/phase5"
