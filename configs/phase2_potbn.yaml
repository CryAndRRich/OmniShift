experiment:
  name: "deepshift_potbn_warmup30"   # deepshift_std | deepshift_potbn | deepshift_potbn_warmupN
  dataset: "cifar10"
  seed: 42
  phase: 2

model:
  type: "potbn"             # potbn = src.models.resnet20_potbn.build_model
  conv_type: "shift"        # mul | shift
  bn_type: "pot"            # std | pot
  bn_warmup: 30             # epochs of std-BN warmup before PoT activates

training:
  epochs: 200
  batch_size: 256
  lr: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  warmup_epochs: 0
  clip_grad: 0.0

output:
  checkpoint_dir: "checkpoints/phase2"
  log_dir: "logs/phase2"
