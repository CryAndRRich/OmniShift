experiment:
  method: "omnishift"     # fp32 | deepshift | apot | denseshift | s3shift | fogzo | aptq | omnishift
  backbone: "resnet20"    # resnet20 | resnet56 | resnet110
  dataset: "cifar10"      # cifar10 | svhn | stl10
  name: ""                # auto: "<method>_<backbone>"
  seed: 42

training:
  epochs: 200
  batch_size: 256
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 0
  clip_grad: 1.0
  sparsity_lambda: 0.0001

output:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
