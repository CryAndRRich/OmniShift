experiment:
  name: "sparseshift_learnable"   # sparseshift_fixed50 | sparseshift_learnable
  dataset: "cifar10"
  seed: 42
  phase: 3

model:
  type: "sparse"            # sparse = src.models.resnet20_sparse.build_model
  sparse_mode: "learnable"  # fixed | learnable
  sparsity_ratio: 0.5       # used for fixed mode only

training:
  epochs: 200
  batch_size: 256
  lr: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  warmup_epochs: 0
  sparsity_lambda: 1.0e-4   # L1 reg coefficient for learnable mode
  clip_grad: 0.0

output:
  checkpoint_dir: "checkpoints/phase3"
  log_dir: "logs/phase3"
